<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 200" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" rx="12" fill="url(#bg)"/>

  <!-- F1 25 -->
  <rect x="20" y="50" width="120" height="100" rx="10" fill="#da3633" filter="url(#shadow)"/>
  <text x="80" y="88" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">F1 25</text>
  <text x="80" y="110" text-anchor="middle" fill="#ffcdd2" font-size="11">UDP :20777</text>
  <text x="80" y="128" text-anchor="middle" fill="#ffcdd2" font-size="11">raw packets</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="100" x2="175" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- UdpListener -->
  <rect x="175" y="50" width="120" height="100" rx="10" fill="#1f6feb" filter="url(#shadow)"/>
  <text x="235" y="88" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">UdpListener</text>
  <text x="235" y="110" text-anchor="middle" fill="#a5d6ff" font-size="11">decode &amp; map</text>
  <text x="235" y="128" text-anchor="middle" fill="#a5d6ff" font-size="11">F1Game.UDP</text>

  <!-- Arrow 2 -->
  <line x1="295" y1="100" x2="330" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Kafka -->
  <rect x="330" y="50" width="120" height="100" rx="10" fill="#238636" filter="url(#shadow)"/>
  <text x="390" y="88" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Kafka</text>
  <text x="390" y="110" text-anchor="middle" fill="#aff5b4" font-size="11">9 topics</text>
  <text x="390" y="128" text-anchor="middle" fill="#aff5b4" font-size="11">KRaft mode</text>

  <!-- Arrow 3 -->
  <line x1="450" y1="100" x2="485" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Consumer -->
  <rect x="485" y="50" width="120" height="100" rx="10" fill="#1f6feb" filter="url(#shadow)"/>
  <text x="545" y="88" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Consumer</text>
  <text x="545" y="110" text-anchor="middle" fill="#a5d6ff" font-size="11">batch flush</text>
  <text x="545" y="128" text-anchor="middle" fill="#a5d6ff" font-size="11">COPY binary</text>

  <!-- Arrow 4 -->
  <line x1="605" y1="100" x2="640" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- TimescaleDB -->
  <rect x="640" y="50" width="120" height="100" rx="10" fill="#9e6a03" filter="url(#shadow)"/>
  <text x="700" y="88" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">TimescaleDB</text>
  <text x="700" y="110" text-anchor="middle" fill="#fde68a" font-size="11">8 hypertables</text>
  <text x="700" y="128" text-anchor="middle" fill="#fde68a" font-size="11">PostgreSQL 16</text>

  <!-- Arrow 5 -->
  <line x1="760" y1="100" x2="795" y2="100" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Grafana -->
  <rect x="795" y="50" width="140" height="100" rx="10" fill="#f78166" filter="url(#shadow)"/>
  <text x="865" y="88" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Grafana</text>
  <text x="865" y="110" text-anchor="middle" fill="#ffdcd7" font-size="11">13 dashboards</text>
  <text x="865" y="128" text-anchor="middle" fill="#ffdcd7" font-size="11">6 live + 7 post</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Labels above arrows -->
  <text x="157" y="40" text-anchor="middle" fill="#8b949e" font-size="9">UDP</text>
  <text x="312" y="40" text-anchor="middle" fill="#8b949e" font-size="9">JSON events</text>
  <text x="467" y="40" text-anchor="middle" fill="#8b949e" font-size="9">consume</text>
  <text x="622" y="40" text-anchor="middle" fill="#8b949e" font-size="9">batch insert</text>
  <text x="777" y="40" text-anchor="middle" fill="#8b949e" font-size="9">SQL queries</text>
</svg>
