apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb:5432
    database: telemetry
    user: telemetry
    secureJsonData:
      password: telemetry
    jsonData:
      sslmode: disable
      timescaledb: true
    isDefault: true
    editable: true
