services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: ${CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-net

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic car-telemetry --partitions 1 --replication-factor 1 --bootstrap-server kafka:29092
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic lap-data --partitions 1 --replication-factor 1 --bootstrap-server kafka:29092
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic car-status --partitions 1 --replication-factor 1 --bootstrap-server kafka:29092
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic participants --partitions 1 --replication-factor 1 --bootstrap-server kafka:29092
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic session --partitions 1 --replication-factor 1 --bootstrap-server kafka:29092
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic session-history --partitions 1 --replication-factor 1 --bootstrap-server kafka:29092
        echo "All topics created."
    restart: "no"
    networks:
      - telemetry-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry
      POSTGRES_DB: telemetry
    volumes:
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
      - tsdb-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U telemetry
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-net

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - telemetry-net

  ingester:
    build:
      context: ..
      dockerfile: src/TelemetryIngester/Dockerfile
    container_name: ingester
    ports:
      - "20777:20777/udp"
    environment:
      Kafka__BootstrapServers: kafka:29092
      TimescaleDb__ConnectionString: "Host=timescaledb;Port=5432;Database=telemetry;Username=telemetry;Password=telemetry"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    networks:
      - telemetry-net

volumes:
  tsdb-data:

networks:
  telemetry-net:
    driver: bridge
